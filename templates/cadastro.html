{% extends "base.html" %}
{% block title %}Cadastro - Cursos Residenciais{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">📝 Cadastro de Aluno</h3>
                </div>
                <div class="card-body">
                    {% if erro %}
                        <div class="alert alert-danger">{{ erro }}</div>
                    {% endif %}
                    <form method="POST">
                        <div class="mb-3">
                            <label>Nome Completo *</label>
                            <input type="text" name="nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>E-mail *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Senha *</label>
                            <input type="password" name="senha" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Tipo de Aluno *</label>
                            <select name="tipo" class="form-control" required>
                                <option value="">Selecione...</option>
                                <option value="Propria casa">Cuidar da minha própria casa</option>
                                <option value="Prestador">Prestar serviços para outras pessoas</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                    </form>
                    <hr>
                    <a href="{{ url_for('login') }}" class="btn btn-link w-100">Já tem conta? Faça login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
